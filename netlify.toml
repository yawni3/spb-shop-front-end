[build]
  command = "npm run build"
  publish = "dist"


[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"


[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
  
[build.environment]
  SECRETS_SCAN_ENABLED = "false"
  
  [[redirects]]
  from = "https://shop.sleepypiebakery.art/*"
  to = "/shop/:splat"
  status = 200

# ⭐ Ana domain'de shop'a gelenleri subdomain'e yönlendir
[[redirects]]
  from = "/shop/*"
  to = "https://shop.sleepypiebakery.art/:splat"
  status = 301

[[redirects]]
  from = "/assets"
  to = "https://shop.sleepypiebakery.art/assets"
  status = 301

[[redirects]]
  from = "/apps"
  to = "https://shop.sleepypiebakery.art/apps"
  status = 301

[[redirects]]
  from = "/wallpapers"
  to = "https://shop.sleepypiebakery.art/wallpapers"
  status = 301

[[redirects]]
  from = "/freebies"
  to = "https://shop.sleepypiebakery.art/freebies"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200